<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}arXiv astro-ph.HE Daily Report{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/style.css?v=15" />
  {% block head %}{% endblock %}
</head>
<body>
  <aside id="sidebar">
    <header class="sidebar-header">
      <div class="sidebar-brand">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none"
             stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <defs>
            <linearGradient id="bh-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#4f46e5" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
          <!-- Tilted accretion disk: outer ring -->
          <ellipse cx="16" cy="16" rx="13.5" ry="4.6"
                   transform="rotate(-22 16 16)"
                   stroke="url(#bh-grad)" />
          <!-- Inner orbit, fainter -->
          <ellipse cx="16" cy="16" rx="8.5" ry="2.6"
                   transform="rotate(-22 16 16)"
                   stroke="url(#bh-grad)" opacity="0.55" />
          <!-- Event horizon: solid -->
          <circle cx="16" cy="16" r="3.3" fill="url(#bh-grad)" />
        </svg>
        <div class="brand-text">
          <p class="kicker">arXiv · astro-ph.HE</p>
          <h1 class="title">Daily Report</h1>
        </div>
      </div>
    </header>

    <section class="sidebar-block">
      <div id="controls"
           hx-get="/controls?active={{ selected_date.isoformat() if selected_date else '' }}"
           hx-trigger="every 30s, generate-done from:body"
           hx-swap="innerHTML">
        {{ controls_html|safe }}
      </div>
    </section>

    <section class="sidebar-block">
      <h2 class="sidebar-h2">Recent</h2>
      <div id="recent-list"
           hx-get="/recent?active={{ selected_date.isoformat() if selected_date else '' }}"
           hx-trigger="load, every 60s, generate-done from:body"
           hx-swap="innerHTML">
        <!-- populated by HTMX -->
      </div>
    </section>
  </aside>

  <main id="main-area">
    {% block main %}{% endblock %}
  </main>
</body>
</html>
